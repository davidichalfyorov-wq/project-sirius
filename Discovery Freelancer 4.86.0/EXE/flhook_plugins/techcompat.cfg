; **** HISTORY ****
; LAST CHANGE DATE 13/5/2012
; ** Revision 1
; Initial configuration. Will likely need work.
;
; ** Revision 2
; Gallic Junkers using Sirius Civilian tech: Red -> Green.
; Liberty Corporations using Bretonian Civilian tech: Green -> White
; Red Hessians and LWB using eachother's tech: White -> Green
; Coalition using Sirius Civilian tech: White -> Red
; IND using Bretonia and Rheinland civilian tech: Green -> White
; IMG using Kusari and Liberty civilian tech: Green -> White
; Junkers using Borderworld Tech: Red -> Green
; Junkers using Rheinland, Liberty and Bretonian civilian tech: Green -> White
; Zoners using Kusari, Rheinland, Liberty or Bretonian civilian tech: Green -> White
;
; ** Revision 3
; Initial values changed: Red 0.3, White 0.75, Green (not self) 0.9, Green (self) 1.0
; Set Kusari Exiles ID.
;
;; ** Revision 4
; Initial values changed: Red 0.6, White 0.75, Green (not self) 0.9, Green/Blue (self) 1.0
; own values for guns as they will get multiplied for each item mounted - 0.91 for 0.9 and 0.766 for 0.75
;
;; ** Revision 5
; Kusari lawfull guns set to 1.0 for BD, Liberty lawfull guns set to 1.0 for Order, Kusari GB and Destroyer guns set to 1.0 for BD

;; ** Revision 7
; LH ships moved to borderworld, Green set to 1.0 to guns.

;; ** Revision 8
; Move DSE/OSC from bret to lib corps. Added havoc to BHG ID.

;; ** Revision 9
; Revised all values according to the requests by faction leads
; Moved Osiris to Corsair and Order as native tech to both. It can be shared out through both factions
; Moved Tundra and it's Forward Gun from Wilde to Nomad - Player request
; Moved Bactrian to generic unlawful ships (lumped in with Pirate Transport/Train and Pilgrim Liner)
; Merged Hogosha and FA lines, lumped the Raba in with this.
; Removed BD/KNF shared gun portion, these are all assigned to KNF now. BD can use their own tech.
; Disabled all the guard IDs that aren't used anymore.
; Hogosha/FA: Set Kusari Lawful SNAC instead of the BD-manufactured unlawful one as their faction tech.
; Kusari Whale: Set to both Kusari Civilian and GMG native tech as per the infocard

;; Revision 10
; Configuration conforming to https://docs.google.com/spreadsheet/ccc?key=0AkrbJfuSqI97dEFwbU83Z3pZZnMtSUtZT3VOaEM1bnc#gid=0
; Will try and keep things synchronized.
; Forward guns moved from weapon to ship tech since those items are part of the ship structure rather then add-ons.

;; Revision 11
; Configuration updates applied as determined by official faction requests, and input from Blodo on the balance side. Also fixed some bugs, verified all IDs do not have typos.
; Admin power setting reduced from 5.0 to 1.0.
; Specops/Terrorist ID set to *0.96 for all tech.
