name: Build (compile + shaders)

# Cloud compile-gate. Gives an agent (ChatGPT / Codex / Claude) that cannot run
# a GPU build locally an automatic answer to "does my patch compile?" - including
# the native deps (SPIRV-Cross, thorncompiler, ...) and the HLSL shaders.
# No GPU and no 7 GB of Discovery LFS data are needed: this only BUILDS, via the
# project's own canonical build (build.sh -> BuildLL) so every generated artefact
# (dxc fetch, CommonVersion.props, native libs, shader compiler) is handled.

on:
  push:
    paths-ignore:
      - 'Discovery Freelancer 4.86.0/**'
      - 'Output/**'
      - 'docs/**'
      - 'tests/goldens/**'
      - '**/*.md'
  pull_request:
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      GIT_LFS_SKIP_SMUDGE: 1
      DOTNET_CLI_TELEMETRY_OPTOUT: 1
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
    steps:
      - name: Checkout (code + submodules, LFS skipped)
        uses: actions/checkout@v4
        with:
          lfs: false
          submodules: recursive

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install native build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake make build-essential ninja-build pkg-config \
            libfontconfig1-dev libfreetype-dev libharfbuzz-dev libopenal-dev

      - name: Build via canonical build.sh (natives + shaders + game)
        run: |
          chmod +x build.sh scripts/depcheck_unix 2>/dev/null || true
          ./build.sh

      - name: Summary
        if: always()
        run: echo "Green = native deps, HLSL shaders and the C# game all compiled."
