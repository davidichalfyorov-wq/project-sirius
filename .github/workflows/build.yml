name: Build (compile + shaders)

# Cloud compile-gate for agents (ChatGPT / Codex / Claude) that cannot build
# locally. Answers "does my patch compile?" - C# AND the HLSL shaders.
#
# It builds ONLY what the GAME needs, NOT the full BuildLL native step:
#   * dxc (pinned in build.config) - HLSL -> SPIR-V
#   * the SPIRV-Cross shared lib    - reflection used by LLShaderCompiler
#   * LLShaderCompiler              - the shader bundler Shader.targets invokes
#   * lancer.csproj (+ LibreLancer) - the game + its shaders
# The editor-only natives (crunch, gtk/lancerdialogs, blurgtext) are skipped:
# the game doesn't link them at build time and extern/crunch is itself an
# incomplete checkout. No GPU and no 7 GB Discovery LFS data are needed.

on:
  push:
    paths-ignore:
      - 'Discovery Freelancer 4.86.0/**'
      - 'Output/**'
      - 'docs/**'
      - 'tests/goldens/**'
      - '**/*.md'
  pull_request:
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GIT_LFS_SKIP_SMUDGE: 1
      DOTNET_CLI_TELEMETRY_OPTOUT: 1
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
    steps:
      - name: Checkout (code + submodules, LFS skipped)
        uses: actions/checkout@v4
        with:
          lfs: false
          submodules: recursive

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends cmake make build-essential

      - name: Fetch pinned dxc
        run: |
          set -euo pipefail
          DXC_URL=$(grep -E '^DXC_LINUXX64=' build.config | cut -d= -f2-)
          mkdir -p bin/builddeps
          curl -fsSL "$DXC_URL" -o /tmp/dxc.tar.gz
          tar -xzf /tmp/dxc.tar.gz -C bin/builddeps
          test -x bin/builddeps/bin/dxc || { d=$(find bin/builddeps -name dxc -type f | head -1); mkdir -p bin/builddeps/bin; ln -sf "$(realpath "$d")" bin/builddeps/bin/dxc; }
          chmod +x bin/builddeps/bin/dxc

      - name: Build SPIRV-Cross shared lib (reflection for the shader compiler)
        run: |
          set -euo pipefail
          cmake -S extern/SPIRV-Cross -B obj/spirvcross -G "Unix Makefiles" \
            -DCMAKE_BUILD_TYPE=MinSizeRel -DSPIRV_CROSS_SHARED=ON -DSPIRV_CROSS_STATIC=OFF \
            -DSPIRV_CROSS_CLI=OFF -DSPIRV_CROSS_ENABLE_TESTS=OFF
          make -C obj/spirvcross -j"$(nproc)"
          cp obj/spirvcross/*.so bin/builddeps/
          ls bin/builddeps/*.so

      - name: Generate CommonVersion.props (normally written by BuildLL, gitignored)
        run: |
          cat > src/CommonVersion.props <<'XML'
          <!-- generated in CI -->
          <Project><PropertyGroup><IncludeSourceRevisionInInformationalVersion>false</IncludeSourceRevisionInInformationalVersion><InformationalVersion>0.0.0-ci</InformationalVersion></PropertyGroup></Project>
          XML

      - name: Build the shader compiler (copies the .so from bin/builddeps to its output)
        run: dotnet build src/LLShaderCompiler/LLShaderCompiler.csproj -v minimal

      - name: Build game + shaders (Release)
        run: dotnet build src/lancer/lancer.csproj -c Release -v minimal

      - name: Summary
        if: always()
        run: echo "Green = C# and the HLSL shaders both compiled."
